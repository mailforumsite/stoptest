<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Проверка от КАТ? Избери действие</title>
  <style>
    :root{
      --bg:#eef2f7;
      --header1:#0d3c78;
      --header2:#1657a8;
      --red1:#ff4b4b;
      --red2:#d91f1f;
      --green1:#2f9e44;
      --green2:#1c7c35;
      --blue1:#3b82f6;
      --blue2:#1e40af;
      --purple1:#ff4fd8;
      --purple2:#c218a6;
      --orange1:#f59e0b;
      --orange2:#d97706;
      --card-radius:24px;
      --shadow:0 10px 22px rgba(0,0,0,.12);
      --text:#ffffff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#dfe7f1 0%, #eef2f7 100%);
      display:flex;
      justify-content:center;
      min-height:100vh;
    }
    .phone{width:100%;max-width:430px;min-height:100vh;background:var(--bg)}
    .header{
  background:linear-gradient(180deg,var(--header1),var(--header2));
  color:white;
  padding:clamp(24px,5vw,34px) clamp(16px,4vw,20px) clamp(20px,4vw,28px);
  text-align:center;
  box-shadow:0 4px 14px rgba(0,0,0,.12);
}

.header h1{
  margin:0;
  font-size:clamp(24px,5.5vw,33px);
  line-height:1.15;
  font-weight:800;
}

.content{
  padding:clamp(12px,4vw,18px) clamp(12px,4vw,16px) clamp(18px,4vw,28px);
}

.hero{
  display:grid;
  gap:clamp(12px,3.5vw,16px);
}

.card{
  border:none;
  border-radius:24px;
  color:white;
  padding:clamp(16px,4vw,20px) clamp(14px,4vw,18px);
  box-shadow:0 10px 22px rgba(0,0,0,.12);
  text-align:left;
  cursor:pointer;
  width:100%;
  text-decoration:none;
  display:block;
}

.emergency{
  background:linear-gradient(180deg,#ff3b30,#c81d13);
  min-height:clamp(95px,24vw,118px);
  display:flex;
  align-items:center;
  gap:clamp(12px,3vw,16px);
}

.icon-big{
  width:clamp(56px,14vw,74px);
  height:clamp(56px,14vw,74px);
  border-radius:20px;
  background:rgba(255,255,255,.14);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(30px,8vw,42px);
  flex:0 0 auto;
}

.emergency .title{
  font-size:clamp(22px,5vw,28px);
  font-weight:800;
  margin-bottom:4px;
}

.emergency .subtitle{
  font-size:clamp(14px,3.5vw,17px);
  font-weight:700;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:clamp(12px,3vw,16px);
}

.small{
  min-height:clamp(135px,34vw,176px);
  display:flex;
  flex-direction:column;
}

.small .icon-big{
  margin-bottom:clamp(10px,3vw,18px);
}

.small .title{
  font-size:clamp(17px,4.5vw,22px);
  font-weight:800;
  margin-bottom:6px;
}

.small .subtitle{
  font-size:clamp(12px,3.3vw,15px);
  font-weight:700;
  line-height:1.3;
}

.bottom{
  display:flex;
  justify-content:center;
  gap:clamp(12px,4vw,18px);
  padding:clamp(16px,4vw,22px) 0 clamp(6px,2vw,10px);
}

.social{
  width:clamp(54px,14vw,66px);
  height:clamp(54px,14vw,66px);
  border-radius:18px;
  border:none;
  box-shadow:0 8px 18px rgba(0,0,0,.12);
  color:white;
  font-size:clamp(24px,7vw,30px);
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
}

.labels{
  display:flex;
  justify-content:center;
  gap:clamp(12px,6vw,24px);
  padding-bottom:clamp(16px,4vw,24px);
  color:#38506d;
  font-size:clamp(11px,3vw,13px);
  font-weight:700;
  text-align:center;
}

.labels span{
  width:clamp(54px,14vw,66px);
}
.meds{background:linear-gradient(180deg,var(--green1),var(--green2))}
.drugtest{background:linear-gradient(180deg,var(--blue1),var(--blue2))}
.rights{background:linear-gradient(180deg,var(--purple1),var(--purple2))}
.lawyers{background:linear-gradient(180deg,var(--orange1),var(--orange2))}

.fb{background:#1c63d5}
.yt{background:#ef2c2c}
.mail{background:#64748b}
  </style>
</head>

          <a class="card small rights" href="dokumenti.html">

          <a class="card small lawyers" href="advokati.html">
